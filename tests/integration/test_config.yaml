

module_area_potentials:
  tiny_files: True
  buffer_crs: "epsg:8857"
  split_by: country_id

  land_cover_types:
    POST_FLOODING: FARM
    RAINFED_CROPLANDS: FARM
    MOSAIC_CROPLAND: FARM
    MOSAIC_VEGETATION: FARM
    CLOSED_TO_OPEN_BROADLEAVED_FOREST: FOREST
    CLOSED_BROADLEAVED_FOREST: FOREST
    OPEN_BROADLEAVED_FOREST: FOREST
    CLOSED_NEEDLELEAVED_FOREST: FOREST
    OPEN_NEEDLELEAVED_FOREST: FOREST
    CLOSED_TO_OPEN_MIXED_FOREST: FOREST
    MOSAIC_FOREST: FOREST
    CLOSED_TO_OPEN_REGULARLY_FLOODED_FOREST: FOREST
    CLOSED_REGULARLY_FLOODED_FOREST: FOREST
    MOSAIC_GRASSLAND: OTHER
    CLOSED_TO_OPEN_SHRUBLAND: OTHER
    CLOSED_TO_OPEN_HERBS: OTHER
    SPARSE_VEGETATION: OTHER
    CLOSED_TO_OPEN_REGULARLY_FLOODED_GRASSLAND: OTHER
    BARE_AREAS: OTHER
    ARTIFICIAL_SURFACES_AND_URBAN_AREAS: URBAN
    WATER_BODIES: WATER
    PERMANENT_SNOW: NOT_SUITABLE
    NO_DATA: NOT_SUITABLE

  techs:
    pv_rooftop:
      initial_area: settlement_area
      continuous_layers:
        settlement_share:
          min: 0.01
          max: 1
          share: 0.8
      binary_layers:
        regions_maritime: 0
        regions_land: 1
        protected: 0
        # Include all land cover types; selection is done by settlement_share
        landcover_FARM: 1
        landcover_FOREST: 1
        landcover_URBAN: 1
        landcover_OTHER: 1
        landcover_NOT_SUITABLE: 0
        landcover_WATER: 0
    pv_open_field:
      initial_area: pixel_area
      continuous_layers:
        slope:
          min: 0
          max: 3
        settlement_share:
          min: 0
          max: 0.01
      binary_layers:
        regions_maritime: 0
        regions_land: 1
        protected: 0
        landcover_FARM: 0.1
        landcover_FOREST: 0
        landcover_URBAN: 0
        landcover_OTHER: 0.2
        landcover_NOT_SUITABLE: 0
        landcover_WATER: 0
    wind_onshore:
      initial_area: pixel_area
      continuous_layers:
        slope:
          min: 0
          max: 20
        settlement_share:
          min: 0
          max: 0.01
      binary_layers:
        regions_maritime: 0
        regions_land: 1
        protected: 0
        landcover_FARM: 0.2
        landcover_FOREST: 0.05
        landcover_URBAN: 0
        landcover_OTHER: 0.3
        landcover_NOT_SUITABLE: 0
        landcover_WATER: 0
    wind_offshore:
      initial_area: pixel_area
      continuous_layers:
        bathymetry:
          min: -50
          max: 0
          share: 0.8
      binary_layers:
        regions_land: 0
        regions_maritime: 1
        protected: 0
      shapes_buffer:
        land: 10000  # meters
