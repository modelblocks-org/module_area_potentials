[workspace]
name = "module_area_potentials"
authors = ["See AUTHORS file"]
description = "This module performs geospatial analyses to determine the available land area for specific technologies, on a by-pixel basis and aggregated to given geographic boundaries."
license = "Apache-2.0"
readme = "README.md"
channels = ["conda-forge", "bioconda"]
platforms = ["win-64", "linux-64", "osx-arm64"]
homepage = "https://www.modelblocks.org/"

[dependencies]
clio-tools = ">=2026.06.23"
conda = ">=25.0.0"
ipdb = ">=0.13.13"
ipykernel = ">=6.29.5"
jsonschema = ">=4.0.0"
mypy = ">=1.15.0"
pytest = ">=8.3.5"
python = ">=3.12"
ruff = ">=0.9.9"
snakefmt = ">=0.11.4"
snakemake-minimal = ">=9.19.0"
pytz = ">=2026.1.post1"

[feature.module]
channels = ["conda-forge"]

[feature.module.dependencies]
curl = ">=8.9.1"
python = ">=3.13"
click = ">=8.2.1"
geopandas = ">=1.1.0"
pandas = ">=2.3.0"
pandera-geopandas = ">=0.24.0"
pyarrow = ">=19.0.1"
xarray = ">=2025.6.1"
netcdf4 = ">=1.7.2"
fiona = ">=1.10.1"
rasterio = ">=1.4.3"
rioxarray = ">=0.19.0"
gdal = ">=3.10.3"
libgdal-arrow-parquet = ">=3.10.3"
libgdal-hdf5 = ">=3.10.3"
matplotlib = ">=3.10.3"
pyyaml = ">=6.0.3"
pyproj = ">=3.7.1"
utm = ">=0.7.0"
glom = ">=24.11.0"
dask = ">=2025.7.0"
numpy = ">=2.3.5"

[environments]
module = { features = ["module"], no-default-feature = true }

[tasks]
test-integration = {cmd = "pytest tests/integration_test.py"}


[tasks.export-snakemake-env]
description = "Export one Pixi environment as Snakemake-compatible conda files"
args = ["env", { arg = "outdir", default = "workflow/envs" }]
depends-on = [
  { task = "_export-snakemake-pin", args = ["{{ env }}", "win-64", "{{ outdir }}"] },
  { task = "_export-snakemake-pin", args = ["{{ env }}", "linux-64", "{{ outdir }}"] },
  { task = "_export-snakemake-pin", args = ["{{ env }}", "osx-arm64", "{{ outdir }}"] },
]
cmd = "pixi workspace export conda-environment --environment '{{ env }}' '{{ outdir }}/{{ env }}.yaml'"

[tasks._export-snakemake-pin]
description = "Export one Pixi environment/platform as a Snakemake-compatible pin file"
args = ["env", "platform", "outdir"]
depends-on = [
  { task = "_export-conda-explicit-spec", args = ["{{ env }}", "{{ platform }}", "{{ outdir }}"] },
]
cmd = "mv '{{ outdir }}/{{ env }}_{{ platform }}_conda_spec.txt' '{{ outdir }}/{{ env }}.{{ platform }}.pin.txt'"

[tasks._export-conda-explicit-spec]
description = "Export one Pixi environment/platform as an explicit conda spec file"
args = ["env", "platform", "outdir"]
cmd = "pixi workspace export conda-explicit-spec --environment '{{ env }}' --platform '{{ platform }}' '{{ outdir }}'"
