$schema: "https://json-schema.org/draft/2020-12/schema"
description: "Schema for user-provided configuration files."
type: object
additionalProperties: false
properties:
  buffer_crs:
    type: string
    description: "CRS for buffering shapes. Use 'UTM' for UTM zones or 'epsg:xxxx' for a specific CRS."
  specs:
    type: object
    properties:
      projection:
        type: string
      resolution:
        type: number
    required: [projection, resolution]
    additionalProperties: false

  techs:
    type: object
    additionalProperties:
      type: object
      properties:
        initial_area:
          type: string
          enum: ["settlement_area", "pixel_area"]
        continuous_layers:
          type: object
          additionalProperties:
            type: object
            properties:
              min:
                type: number
              max:
                type: number
            required: ["min", "max"]
        binary_layers:
          type: object
          additionalProperties:
            type: number
        shapes_buffer:
          type: object
      required: ["initial_area", "continuous_layers", "binary_layers"]
      additionalProperties: false
