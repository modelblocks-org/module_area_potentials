# Output specifications 
specs:
  projection: EPSG:4326
  resolution: 0.008333 # 30/3600 arcsec in degree, yaml does not handle "/"

# Technical criteria
techs_onshore:
  pv_open_field:
    max_slope: 3
    land_cover:
      FARM: 0.1
      FOREST: 0  # no PV open field in forest
      OTHER: 0.2
      URBAN: 0  # no PV open field in urban
    settlement:
      max_settlement: 0.1
      weight: -1
  wind_onshore:    
    max_slope: 20
    land_cover:
      FARM: 0.2
      FOREST: 0.05
      OTHER: 0.3
      URBAN: 0  # no wind onshore in urban
    settlement:
      max_settlement: 0.1
      weight: -1
  pv_rooftop:
    max_slope: 90
    land_cover:
      FARM: 0
      FOREST: 0
      OTHER: 0
      URBAN: 1
    settlement:
      max_settlement: 1
      weight: 0.8
